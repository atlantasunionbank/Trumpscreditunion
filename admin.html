<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Admin - Atlantas Union Bank</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="content"></div>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>emailjs.init('Wv36e0dXGbZcZ5v8R');</script>
<script src="shared.js"></script>
<script>
auth.onAuthStateChanged(function(u){if(!u){window.location.href='index.html';return}db.ref('users/'+u.uid+'/email').once('value').then(function(s){const e=s.val();if(e!=='admin@gmail.com'&&e!=='adminadex@gmail.com'){window.location.href='dashboard.html';return}fetch('admin_content.html').then(r=>r.text()).then(h=>{document.getElementById('content').innerHTML=h;const w=setInterval(()=>{if(userData&&currentUser){clearInterval(w);const sc=document.createElement('script');sc.src='dashboard.js';document.body.appendChild(sc)}},100)})})});
</script>
</body>
</html>
