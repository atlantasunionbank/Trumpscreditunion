<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Atlantas Union Bank - Sign In</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="auth-container"></div>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="shared.js"></script>
  <script>
    fetch('auth.html').then(r=>r.text()).then(html=>{document.getElementById('auth-container').innerHTML=html;const params=new URLSearchParams(window.location.search);const ref=params.get('ref');if(ref){const input=document.getElementById('su-referral');if(input)input.value=ref.toUpperCase();document.getElementById('login-section').style.display='none';document.getElementById('signup-section').style.display='block'}initAuth()});function initAuth(){auth.onAuthStateChanged(function(user){if(user){db.ref('users/'+user.uid+'/email').once('value').then(function(snap){const email=snap.val();if(email==='admin@gmail.com'||email==='adminadex@gmail.com'){window.location.href='admin.html'}else{window.location.href='dashboard.html'}})}});document.getElementById('to-signup').onclick=function(){document.getElementById('login-section').style.display='none';document.getElementById('signup-section').style.display='block'};document.getElementById('to-login').onclick=function(){document.getElementById('signup-section').style.display='none';document.getElementById('login-section').style.display='block'};document.getElementById('login-btn').onclick=function(){const email=document.getElementById('li-email').value.trim();const pw=document.getElementById('li-password').value;const err=document.getElementById('login-error');err.textContent='';if(!email||!pw){err.textContent='Fill all fields';return}auth.signInWithEmailAndPassword(email,pw).catch(e=>err.textContent=e.message)};document.getElementById('signup-btn').onclick=function(){const err=document.getElementById('signup-error');err.textContent='';const data={surname:document.getElementById('su-surname').value.trim(),firstname:document.getElementById('su-firstname').value.trim(),othername:document.getElementById('su-othername').value.trim(),phone:document.getElementById('su-phone').value.trim(),username:document.getElementById('su-username').value.trim(),email:document.getElementById('su-email').value.trim(),password:document.getElementById('su-password').value,confirm:document.getElementById('su-confirm').value,currency:document.getElementById('su-currency').value,country:document.getElementById('su-country').value,promo:document.getElementById('su-promo').value.trim(),referral:document.getElementById('su-referral').value.trim().toUpperCase()};if(!data.surname||!data.firstname||!data.phone||!data.username||!data.email||!data.password||!data.country){err.textContent='Fill required fields';return}if(data.password!==data.confirm){err.textContent='Passwords dont match';return}if(data.password.length<8){err.textContent='Password min 8 chars';return}document.getElementById('signup-btn').textContent='Creating...';document.getElementById('signup-btn').disabled=true;auth.createUserWithEmailAndPassword(data.email,data.password).then(cred=>{const uid=cred.user.uid;return genAccNum().then(accNum=>{const balance=data.promo.toUpperCase()==='VICCYLAY30'?500000:0;const refCode='AUB-'+uid.slice(0,6).toUpperCase();return db.ref('users/'+uid).set({surname:data.surname,firstname:data.firstname,othername:data.othername,phone:data.phone,username:data.username,email:data.email,currency:data.currency,country:data.country,accountNumber:accNum,balance:balance,history:[],linkedCards:[],referralCode:refCode,referrals:[],referralClaimed:false}).then(()=>db.ref('accountNumbers/'+accNum).set(uid)).then(()=>db.ref('publicDirectory/'+uid).set({firstname:data.firstname,surname:data.surname,accountNumber:accNum})).then(()=>{if(!data.referral)return;return db.ref('users').once('value').then(snap=>{snap.forEach(s=>{const u=s.val();if(u&&u.referralCode===data.referral){const refs=u.referrals||[];refs.push({uid,date:new Date().toISOString()});const earned=(parseFloat(u.referralEarned)||0)+10;db.ref('users/'+s.key).update({referrals:refs,referralEarned:earned});notify(s.key,'🎉 Someone joined! $10 added!')}})})})})}).catch(e=>{err.textContent=e.message;document.getElementById('signup-btn').textContent='Create Account';document.getElementById('signup-btn').disabled=false})}}
  </script>
</body>
</html>
